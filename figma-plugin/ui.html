<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font: 12px/1.4 -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        margin: 0;
        padding: 12px;
        color: #111;
      }
      label {
        display: block;
        font-weight: 600;
        margin: 10px 0 4px;
      }
      input {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 12px;
      }
      .row {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }
      button {
        flex: 1;
        padding: 8px 10px;
        border: none;
        border-radius: 4px;
        font-weight: 600;
        cursor: pointer;
      }
      .primary {
        background: #7c3aed;
        color: #fff;
      }
      .secondary {
        background: #e5e7eb;
        color: #111;
      }
      #status {
        margin-top: 12px;
        padding: 8px;
        border-radius: 4px;
        font-size: 11px;
        white-space: pre-wrap;
      }
      .ok {
        background: #ecfdf5;
        color: #065f46;
      }
      .err {
        background: #fef2f2;
        color: #991b1b;
      }
      .muted {
        color: #6b7280;
        font-size: 11px;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <p class="muted">Pegá los datos del paso Figma en la web. El job se consume una sola vez.</p>
    <label for="apiBase">URL base del API (sin barra final)</label>
    <input id="apiBase" type="text" placeholder="https://tu-api.railway.app o http://localhost:3001" autocomplete="off" />
    <label for="jobId">Job ID</label>
    <input id="jobId" type="text" autocomplete="off" />
    <label for="secret">Secret</label>
    <input id="secret" type="password" autocomplete="off" />
    <div class="row">
      <button type="button" class="primary" id="run">Crear frames</button>
      <button type="button" class="secondary" id="close">Cerrar</button>
    </div>
    <div id="status"></div>
    <script>
      const apiBaseEl = document.getElementById('apiBase');
      const jobIdEl = document.getElementById('jobId');
      const secretEl = document.getElementById('secret');
      const statusEl = document.getElementById('status');

      function setStatus(text, kind) {
        statusEl.textContent = text || '';
        statusEl.className = kind ? kind : '';
      }

      window.onmessage = (event) => {
        const m = event.data && event.data.pluginMessage;
        if (!m) return;
        if (m.type === 'init') {
          if (m.apiBase) apiBaseEl.value = m.apiBase;
          return;
        }
        if (m.type === 'error') {
          setStatus(m.text || 'Error', 'err');
          return;
        }
        if (m.type === 'done') {
          setStatus('Listo: ' + m.count + ' frame(s) creado(s).', 'ok');
        }
      };

      document.getElementById('run').onclick = () => {
        setStatus('');
        parent.postMessage(
          {
            pluginMessage: {
              type: 'save-api-base',
              apiBase: apiBaseEl.value.trim(),
            },
          },
          '*'
        );
        parent.postMessage(
          {
            pluginMessage: {
              type: 'build',
              apiBase: apiBaseEl.value.trim(),
              jobId: jobIdEl.value.trim(),
              secret: secretEl.value.trim(),
            },
          },
          '*'
        );
      };

      document.getElementById('close').onclick = () => {
        parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
      };

      parent.postMessage({ pluginMessage: { type: 'ui-ready' } }, '*');
    </script>
  </body>
</html>
