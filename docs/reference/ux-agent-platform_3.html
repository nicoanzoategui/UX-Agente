            else if (step === 4) renderStep4();
        }

        function updateProgressBar() {
            document.getElementById('progress-label').textContent = `Paso ${currentStep} de 4`;
            
            // Reset all steps
            for (let i = 1; i <= 4; i++) {
                const stepEl = document.getElementById(`step${i}`);
                if (i <= currentStep) {
                    stepEl.className = 'step-indicator flex-1 h-2 bg-purple-600 rounded transition-all';
                } else {
                    stepEl.className = 'step-indicator flex-1 h-2 bg-gray-200 rounded transition-all';
                }
            }
        }

        // Documentation tabs
        function showDocTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.doc-content').forEach(el => el.classList.add('hidden'));
            // Remove active state from all tab buttons
            document.querySelectorAll('.doc-tab').forEach(el => {
                el.classList.remove('bg-white', 'text-purple-600', 'border', 'border-purple-600');
                el.classList.add('text-gray-600', 'hover:bg-gray-100');
            });
            
            // Show selected tab
            document.getElementById(`doc-${tabName}`).classList.remove('hidden');
            // Activate button
            const activeButton = document.getElementById(`tab-${tabName}`);
            activeButton.classList.add('bg-white', 'text-purple-600', 'border', 'border-purple-600');
            activeButton.classList.remove('text-gray-600', 'hover:bg-gray-100');
